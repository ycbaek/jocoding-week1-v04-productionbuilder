<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 점심 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>오늘 점심 뭐 먹지?</h1>
        <p class="subtitle">고민하지 말고 뽑으세요!</p>

        <div class="categories" id="categories"></div>

        <div class="menu-card" id="menuCard"></div>

        <button class="btn" id="recommendBtn" onclick="recommend()">메뉴 추천</button>

        <div class="history" id="historySection" style="display:none;">
            <h3>최근 추천</h3>
            <div id="history"></div>
        </div>

        <div class="request">
            <h3>메뉴 추가 요청</h3>
            <p class="request-desc">먹고 싶은 메뉴가 없나요? 알려주세요!</p>

            <form id="requestForm" action="https://formspree.io/f/mvzekkvj" method="POST">
                <input type="email" name="email" placeholder="이메일 (답장 받을 주소)" required>
                <input type="text" name="menu" placeholder="추가하고 싶은 메뉴" required>
                <textarea name="message" rows="3" placeholder="하고 싶은 말 (선택)"></textarea>
                <button type="submit" class="btn btn-secondary" id="requestBtn">요청 보내기</button>
            </form>

            <p class="form-status" id="formStatus"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
